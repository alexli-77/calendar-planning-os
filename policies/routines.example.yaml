# Copy this file to routines.yaml and edit it locally.
# Do not commit personal routines if they contain private details.

timezone: America/Toronto

fixed_routines:
  - title: Lunch
    days: [mon, tue, wed, thu, fri]
    time: "12:00-13:00"
    type: recovery
    protected: true

  - title: Exercise
    days: [mon, wed, fri]
    time: "18:00-19:00"
    type: recovery
    protected: true

  - title: Daily review
    days: [mon, tue, wed, thu, fri]
    time: "20:30-20:45"
    type: review
    protected: false

# The current alpha expands these routines into visible draft blocks.
# Protected routines are intended to act as hard constraints.

routine_rules:
  - Existing calendar events override these examples.
  - Current alpha treats fixed routines as visible draft blocks and placement constraints.
  - Protected routines should not be moved in future writeback flows unless the user explicitly asks.
  - Non-protected routines are marked for future rescheduling support.
